name: boussole
description: "Application familiale Boussole"
publish_to: 'none'

version: 2.0.0+3

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^17.3.0

  # State management
  flutter_riverpod: ^2.6.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.6
  crypto: 3.0.7

  # UI
  flutter_animate: ^4.5.2
  google_fonts: ^8.1.0

  # Firebase
  firebase_core: ^4.1.1
  firebase_auth: ^6.0.2
  cloud_firestore: ^6.0.1
  firebase_storage: ^13.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

  # Icônes de l'application
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo/
    - assets/images/backgrounds/
    - assets/images/mascotte/
    - assets/images/avatars/
    - assets/images/objects/
    - assets/images/rewards/
    - assets/images/badges/
    - assets/images/routines/
    - assets/images/house/house_background.png
    - assets/images/guardians/crystal/
    - assets/images/guardians/pixel/
    - assets/images/guardians/pyro/
    - assets/images/guardians/gear/
    - assets/images/guardians/wave/
    - assets/data/
    - assets/data/school_holidays/

flutter_launcher_icons:
  android: true
  ios: true

  image_path: "assets/images/logo/app_icon.png"

  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo/app_icon.png"

  remove_alpha_ios: true

  min_sdk_android: 21
